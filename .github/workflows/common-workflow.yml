name: common-workflow pipeline
on:
#  push:
#    branches:
#      - master
#      - develop
#      - 'release/**'
#      - 'feature/**'   # triggers on all feature branches
#  pull_request:
#    branches:
#      - master
#      - develop
#      - 'release/**'
  workflow_dispatch:
   inputs:
#    branch:
#      description: 'Branch or tag to deploy'
#      required: true
#      type: choice                     # ← this creates a dropdown!
#      options:
#        - master
#        - develop
#        - release/v1.0.7
#        - feature/**
     APP_VERSION:
       description: 'Application version (e.g. 1.0.7)'
       required: true
       type: string
       default: "1.0.7"

       ENV:
         description: 'Target environment'
         required: true
         type: choice
         options:
           - dev
           - int
           - prod
         default: dev
permissions:
  contents: read
  packages: write

env:
  APP_NAME: welcome
  IMAGE_TAG: ${{ inputs.APP_VERSION }}
  IMAGE_NAME: welcome:${{ inputs.APP_VERSION }}
  NAMESPACE: ${{
    inputs.ENV == 'prod' && 'samrat-prd' ||
    inputs.ENV == 'int' && 'samrat-int' ||
    'samrat-dev'
    }}
  KUBECONFIG_PATH: C:\Users\RAJMC\.kube\config
  DOCKER_REGISTRY: ghcr.io/${{ github.repository }}
  MAVEN_CLI_OPTS: "-B -DskipTests"
  HEALTH_URL: http://localhost:31010/welcome-app/welcome
  APP_VERSION: ${{ inputs.APP_VERSION }}

jobs:
  # --------------------------------------------------------
  # 1️⃣ BUILD
  # --------------------------------------------------------
  build:
    name: compile-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build with Maven
        run: mvn $MAVEN_CLI_OPTS clean package
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/*.jar

  # --------------------------------------------------------
  # 2️⃣ VERIFY BUILD (Parallel Jobs)
  # --------------------------------------------------------
  blackduck-scan:
    name: blackduck-scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: echo "Run BlackDuck scan here"

  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: echo "Run SonarQube or code quality scan here"

  xray_scan:
    name: xray_scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: echo "Run JFrog Xray scan here"

  checkmarx_scan:
    name: checkmarx_scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: echo "Run Checkmarx scan"

  sast-scan:
    name: sast-scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: echo "Run static analysis tools (Snyk, Bandit, etc.)"

  sca-scan:
    name: sca-scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: echo "Run dependency vulnerability scan"

  unit-test:
    name: unit-test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Run Unit Tests
        run: mvn test
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

  # --------------------------------------------------------
  # 3️⃣ BUILD-CONTAINER
  # --------------------------------------------------------
  build-docker:
    name: build-docker-image
    runs-on: ubuntu-latest
    needs: [blackduck-scan, code-quality, xray_scan, checkmarx_scan, sast-scan, sca-scan, unit-test]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker Image
        run: |
          echo "Building image: $DOCKER_REGISTRY/$IMAGE_NAME"
          docker build -t $DOCKER_REGISTRY/$IMAGE_NAME .
      - name: Push Docker Image
        run: |
         echo "Pushing image: $DOCKER_REGISTRY/$IMAGE_NAME"
         docker push $DOCKER_REGISTRY/$IMAGE_NAME

  # --------------------------------------------------------
  # 4️⃣ VERIFY-DOCKER
  # --------------------------------------------------------
  container-scan:
    name: container-scan
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          format: table
          exit-code: '0'
          ignore-unfixed: true

  # --------------------------------------------------------
  # 5️⃣ DEPLOY
  # --------------------------------------------------------
  kob-deploy:
    name: deploy-to-local-kubernetes
    runs-on: self-hosted
    needs: container-scan
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to Kubernetes
        shell: pwsh
        env:
          NAMESPACE: ${{ env.NAMESPACE }}
          APP_VERSION: ${{ inputs.APP_VERSION }}
          APP_NAME: ${{ env.APP_NAME }}
          DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          ENV: ${{ inputs.ENV }}
          KUBECONFIG_PATH: ${{ env.KUBECONFIG_PATH }}
        run: |
          .\.github\scripts\deploy.ps1

  # --------------------------------------------------------
  # 6️⃣ VALIDATE DEPLOY
  # --------------------------------------------------------
  validate-deploy:
    name: validate-deploy
    runs-on: self-hosted
    needs: kob-deploy

    steps:
      - name: Set up KUBECONFIG
        shell: pwsh
        run: |
          $env:KUBECONFIG = "${{ env.KUBECONFIG_PATH }}"
          kubectl config use-context docker-desktop
          kubectl cluster-info
          kubectl get nodes

      - name: Verify ${{ env.APP_NAME }} pods
        shell: pwsh
        run: |
          echo " Checking ${{ env.APP_NAME }} pods in namespace '${{ env.NAMESPACE }}'..."
          $pods = kubectl get pods -n ${{ env.NAMESPACE }} --no-headers | Select-String "${{ env.APP_NAME }}"
          if (-not $pods) {
            echo " No pods found for ${{ env.APP_NAME }}!"
            exit 1
          }
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide | Select-String "${{ env.APP_NAME }}"

      - name: Display deployment rollout history
        shell: pwsh
        run: |
          echo " Deployment rollout history for ${{ env.APP_NAME }}:"
          kubectl rollout history deployment/${{ env.APP_NAME }} -n ${{ env.NAMESPACE }}
